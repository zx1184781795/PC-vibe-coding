<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App - Vibe Coding</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Todo List</h1>
    <div class="input-group">
      <input type="text" id="todo-input" placeholder="输入待办事项..." autofocus>
      <button id="add-btn">添加</button>
    </div>
    <ul id="todo-list"></ul>
    <div class="footer">
      <span id="count">0 项待办</span>
      <button id="clear-btn">清除已完成</button>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
