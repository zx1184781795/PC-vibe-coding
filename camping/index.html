<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>露营小助手</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
/* ===== Reset ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FBF5EB;--card:#fff;--primary:#C8651A;--primary-dark:#a85216;
  --primary-light:#FFF5ED;--text:#2C1A0E;--text2:#6B5D52;--text3:#9B8D82;
  --border:#EBE3D8;--green:#4CAF50;--red:#E53935;--green-bg:#E8F5E9;
  --red-bg:#FFEBEE;--radius:10px;--radius-lg:16px;--shadow:0 2px 12px rgba(0,0,0,.05);
  --shadow-lg:0 4px 24px rgba(0,0,0,.08);
}
html,body{height:100%;overflow:hidden}
body{
  font-family:"Noto Sans SC",-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  background:#ede9e2;color:var(--text);font-size:16px;line-height:1.6;
  display:flex;justify-content:center;
}
#app{
  width:100%;max-width:540px;height:100vh;height:100dvh;
  display:flex;flex-direction:column;background:var(--bg);
  position:relative;overflow:hidden;box-shadow:var(--shadow-lg);
}
/* ===== Fixed Header ===== */
#header{
  display:none;flex-shrink:0;height:56px;align-items:center;gap:4px;
  padding:0 8px;background:rgba(255,255,255,.96);z-index:500;
  -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
}
#header.show{display:flex}
.btn-icon{
  display:flex;align-items:center;justify-content:center;
  width:40px;height:39px;padding:8px;border:none;background:none;
  font-size:20px;color:var(--text2);cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.header-center{
  flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
}
.header-title{
  font-family:'ZCOOL XiaoWei','Noto Sans SC',serif;
  font-size:17px;font-weight:700;color:var(--text);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.header-sub{
  font-size:12px;color:var(--text2);margin-top:1px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
/* ===== Plan Dropdown (in header) ===== */
.header-plan-dropdown{
  display:none;position:absolute;top:56px;left:8px;right:8px;
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-lg);
  z-index:600;overflow:hidden;max-height:280px;overflow-y:auto;
}
.header-plan-dropdown.show{display:block}
/* ===== Tab Bar ===== */
#tabbar{
  position:sticky;bottom:0;display:flex;flex-shrink:0;
  background:rgba(255,255,255,.96);
  -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
  padding-bottom:env(safe-area-inset-bottom,0);z-index:500;height:72px;
}
.tab{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  padding:8px 4px;cursor:pointer;font-size:11px;font-weight:400;
  color:var(--text2);transition:color .18s;user-select:none;
  -webkit-tap-highlight-color:transparent;gap:3px;position:relative;
}
.tab .tab-emoji{font-size:22px;line-height:1}
.tab.active{color:var(--primary);font-weight:700;letter-spacing:.02em}
.tab.active::before{
  content:'';position:absolute;top:0;left:25%;width:50%;height:2.5px;
  background:var(--primary);border-radius:0 0 3px 3px;
}
/* ===== Content ===== */
#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.panel{display:none;padding:0 16px 24px;min-height:100%}
.panel.active{display:block}
/* ===== Cards ===== */
.card{
  background:var(--card);border-radius:var(--radius-lg);padding:18px;
  margin-bottom:12px;box-shadow:var(--shadow);
}
.card-title{
  font-size:15px;font-weight:700;color:var(--text);margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.card-title .icon{font-size:22px}
/* ===== Buttons ===== */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:10px 20px;border:none;border-radius:var(--radius);font-size:14px;
  font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit;
  -webkit-tap-highlight-color:transparent;white-space:nowrap;
}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:active{background:var(--primary-dark)}
.btn-outline{background:transparent;border:1.5px solid var(--primary);color:var(--primary)}
.btn-outline:active{background:var(--primary-light)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-block{width:100%;padding:12px 16px;font-size:15px}
.btn-xs{padding:4px 10px;font-size:11px;border-radius:8px}
.btn-icon{background:none;border:none;cursor:pointer;font-size:18px;padding:4px 6px;
  color:var(--text3);transition:color .15s;font-family:inherit;line-height:1}
.btn-icon:hover{color:var(--text)}
.btn-icon.danger{color:var(--red)}
.btn-circle{
  width:36px;height:36px;border-radius:50%;background:var(--primary);color:#fff;
  border:none;font-size:22px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;box-shadow:0 2px 8px rgba(200,101,26,.3);transition:all .15s;
}
.btn-circle:active{transform:scale(.93)}
/* ===== Home Panel ===== */
.home-hero{text-align:center;padding:32px 0 24px}
.home-hero .hero-emoji{font-size:52px;line-height:1;margin-bottom:12px;display:block}
.home-hero h1{font-size:28px;font-weight:800;color:var(--text);margin-bottom:6px}
.home-hero p{font-size:15px;color:var(--text2)}
.home-plan-card{
  background:var(--card);border-radius:var(--radius-lg);padding:18px;
  margin-bottom:12px;box-shadow:var(--shadow);cursor:pointer;
  border:2px solid transparent;transition:border-color .2s;position:relative;
}
.home-plan-card:active{border-color:var(--primary)}
.home-plan-card .plan-name{font-size:18px;font-weight:700;color:var(--text);margin-bottom:4px}
.home-plan-card .plan-meta{font-size:13px;color:var(--text2);display:flex;gap:12px}
.home-plan-card .plan-stats{display:flex;gap:16px;margin-top:10px;font-size:13px;color:var(--text2)}
.home-plan-card-actions{position:absolute;top:12px;right:12px;display:flex;gap:6px;z-index:2}
.home-plan-card-btn{width:30px;height:30px;border-radius:8px;border:none;background:rgba(0,0,0,.06);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:background .15s;-webkit-tap-highlight-color:transparent;line-height:1;padding:0}
.home-plan-card-btn:hover{background:rgba(0,0,0,.12)}
.home-plan-card-btn.delete-btn:hover{background:rgba(229,57,53,.15)}
.home-plan-card-btn.export-btn:hover{background:rgba(76,175,80,.15)}
.home-cta{text-align:center;padding:8px 0 32px}
.home-cta .hint{font-size:13px;color:var(--text3);margin-bottom:10px}
.home-empty{text-align:center;padding:40px 16px}
.home-empty .empty-icon{font-size:48px;margin-bottom:12px;display:block}
.home-empty .empty-text{font-size:15px;color:var(--text2);margin-bottom:16px}
/* ===== Plan Switcher ===== */
.ov-plan-header{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.plan-switcher{position:relative;flex:1;min-width:0}
.plan-switcher-trigger{
  display:flex;align-items:center;gap:6px;cursor:pointer;
  padding:8px 12px;border-radius:10px;background:var(--primary-light);
  font-size:16px;font-weight:700;color:var(--primary);user-select:none;
  -webkit-tap-highlight-color:transparent;width:100%;
}
.plan-switcher-trigger .plan-trigger-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.plan-switcher-trigger .dropdown-arrow{font-size:10px;transition:transform .2s;flex-shrink:0}
.plan-switcher-trigger .dropdown-arrow.open{transform:rotate(180deg)}
.plan-dropdown{
  display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-lg);
  z-index:50;overflow:hidden;max-height:280px;overflow-y:auto;
}
.plan-dropdown.show{display:block}
.plan-dropdown-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;cursor:pointer;font-size:14px;font-weight:500;
  border-bottom:1px solid var(--border);transition:background .1s;
}
.plan-dropdown-item:active{background:var(--primary-light)}
.plan-dropdown-item.active{color:var(--primary);font-weight:700}
.plan-dropdown-item .plan-item-check{color:var(--primary);font-size:14px;margin-right:4px}
.plan-dropdown-item .plan-item-delete{
  color:var(--red);font-size:18px;padding:2px 6px;cursor:pointer;
  border-radius:6px;line-height:1;
}
.plan-dropdown-item .plan-item-delete:active{background:var(--red-bg)}
.plan-dropdown-add{
  padding:12px 16px;text-align:center;color:var(--primary);font-weight:600;
  cursor:pointer;font-size:14px;border-top:1px solid var(--border);
}
.plan-dropdown-add:active{background:var(--primary-light)}
.plan-dropdown-backdrop{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:49}
.plan-dropdown-backdrop.show{display:block}
/* ===== Overview Panel ===== */
.ov-info-row{display:flex;gap:16px;margin-bottom:5px}
.ov-info-item{flex:1}
.ov-info-item .label{font-size:11px;color:var(--text3);margin-bottom:2px}
.ov-info-item .value{font-size:14px;font-weight:600;color:var(--text)}
.ov-family-card{
  display:flex;align-items:center;gap:12px;padding:14px;background:var(--card);
  border-radius:var(--radius);margin-bottom:8px;box-shadow:var(--shadow);
}
.ov-family-card .fam-emoji{font-size:28px}
.ov-family-card .fam-name{font-size:15px;font-weight:700;color:var(--text)}
.ov-family-card .fam-count{font-size:12px;color:var(--text3);margin-left:auto}
.ov-member-tag{
  display:inline-flex;align-items:center;gap:4px;padding:5px 12px;
  background:var(--primary-light);border-radius:20px;font-size:13px;
  color:var(--primary);margin:3px 4px 3px 0;font-weight:500;
}
.ov-stats-bar{
  display:flex;border-radius:var(--radius);overflow:hidden;margin-top:12px;
}
.ov-stat-item{
  flex:1;text-align:center;padding:14px 8px;background:var(--card);
  border-right:1px solid var(--border);
}
.ov-stat-item:last-child{border-right:none}
.ov-stat-item .stat-num{font-size:22px;font-weight:800;color:var(--primary)}
.ov-stat-item .stat-label{font-size:11px;color:var(--text3);margin-top:2px}
.ov-map-container{position:relative;border-radius:var(--radius);overflow:hidden;margin-bottom:10px}
.ov-map-iframe{width:100%;height:260px;border:none;display:block}
.ov-map-inputs{margin-top:12px}
.ov-map-input-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.ov-map-input-row label{font-size:12px;color:var(--text2);white-space:nowrap;min-width:42px}
.ov-map-input-row input{
  flex:1;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;
  font-size:13px;font-family:inherit;background:var(--card);color:var(--text);
  min-width:0;
}
.ov-map-input-row input:focus{outline:none;border-color:var(--primary)}
/* ===== Weather Card ===== */
.weather-card{
  background:linear-gradient(135deg,#E8F4FD 0%,#F0F7FF 100%);
  border-radius:var(--radius-lg);padding:18px;margin-bottom:12px;
  box-shadow:var(--shadow);
}
.weather-header{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;
}
.weather-title{font-size:15px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px}
.weather-refresh{
  font-size:12px;color:var(--primary);cursor:pointer;padding:4px 8px;
  border-radius:6px;transition:background .15s;user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.weather-refresh:active{background:rgba(200,101,26,.1)}
.weather-current{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.weather-temp-main{font-size:42px;font-weight:800;color:var(--text);line-height:1}
.weather-curr-info{flex:1}
.weather-desc{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px}
.weather-details{font-size:12px;color:var(--text2);display:flex;gap:12px}
.weather-forecast{display:flex;gap:8px;border-top:1px solid rgba(0,0,0,.06);padding-top:14px}
.weather-day{
  flex:1;text-align:center;padding:8px 4px;background:rgba(255,255,255,.5);
  border-radius:10px;
}
.weather-day .day-name{font-size:11px;color:var(--text3);margin-bottom:6px}
.weather-day .day-icon{font-size:22px;line-height:1;margin-bottom:6px}
.weather-day .day-temps{font-size:11px;color:var(--text);font-weight:600}
.weather-day .day-temps .low{color:var(--text3);font-weight:400}
.weather-error{text-align:center;padding:20px;color:var(--text3);font-size:13px}
.weather-error .retry-link{color:var(--primary);cursor:pointer;text-decoration:underline}
/* ===== Skeleton Loading ===== */
@keyframes shimmer{0%{background-position:-200px 0}100%{background-position:calc(200px + 100%) 0}}
.skeleton-line{
  height:14px;background:linear-gradient(90deg,#e0e8f0 25%,#eef3f8 50%,#e0e8f0 75%);
  background-size:200px 100%;animation:shimmer 1.5s infinite;border-radius:4px;margin-bottom:10px;width:60%;
}
.skeleton-line-lg{height:24px;width:40%}
.skeleton-row{display:flex;gap:8px;margin-top:12px}
.skeleton-day{flex:1;height:56px;background:linear-gradient(90deg,#e0e8f0 25%,#eef3f8 50%,#e0e8f0 75%);background-size:200px 100%;animation:shimmer 1.5s infinite;border-radius:10px}
/* ===== Supplies Panel ===== */
.sup-subtabs{display:flex;gap:6px;margin-bottom:14px}
.sup-subtab{
  flex:1;padding:10px 6px;text-align:center;background:var(--card);
  border-radius:var(--radius);cursor:pointer;font-size:13px;font-weight:600;
  border:1.5px solid var(--border);transition:all .15s;user-select:none;color:var(--text2);
}
.sup-subtab.active{background:var(--primary-light);border-color:var(--primary);color:var(--primary)}
.sup-filter-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.sup-filter-row select{
  flex:1;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius);
  font-size:13px;font-family:inherit;background:var(--card);color:var(--text);
}
.sup-progress-pill{
  display:inline-flex;align-items:center;padding:7px 14px;
  background:var(--primary-light);border-radius:16px;
  font-size:13px;color:var(--primary);font-weight:600;white-space:nowrap;
  border:1px solid rgba(200,101,26,.15);
}
.sup-divider{
  height:1px;background:rgba(200,101,26,.15);margin:6px 0 10px;
}
.sup-cat-header{
  font-size:12px;color:var(--text3);font-weight:600;padding:4px 2px 2px;
  text-transform:uppercase;letter-spacing:.5px;
}
.sup-item{
  display:flex;align-items:center;gap:8px;padding:10px 12px;
  background:var(--card);border-radius:var(--radius);margin-bottom:4px;
  box-shadow:0 1px 3px rgba(0,0,0,.03);transition:opacity .2s;
}
.sup-item.done{opacity:.55}
.sup-item input[type=checkbox]{width:18px;height:18px;accent-color:var(--primary);flex-shrink:0}
.sup-item .item-info{flex:1;min-width:0;display:flex;align-items:center;gap:8px}
.sup-item .item-name{font-size:14px;font-weight:500;color:var(--text)}
.sup-item .item-name.done-name{text-decoration:line-through;color:var(--text3)}
.sup-item .item-qty{font-size:12px;color:var(--text3);white-space:nowrap}
.sup-item .item-tag{
  display:inline-block;padding:2px 10px;background:var(--primary-light);
  border-radius:10px;font-size:11px;color:var(--primary);font-weight:500;flex-shrink:0;
}
.sup-item .item-status{
  display:inline-block;padding:2px 8px;background:#e6f7e6;
  border-radius:10px;font-size:11px;color:#2d8a2d;font-weight:500;flex-shrink:0;
}
.sup-item .item-actions{display:flex;gap:2px;flex-shrink:0}
/* FAB (Floating Action Button) */
.sup-fab{
  position:fixed;bottom:80px;right:20px;width:50px;height:50px;
  border-radius:50%;background:var(--primary);color:#fff;border:none;
  font-size:28px;cursor:pointer;box-shadow:0 4px 16px rgba(200,101,26,.35);
  z-index:150;display:flex;align-items:center;justify-content:center;
  transition:transform .15s,box-shadow .15s;line-height:1;
}
.sup-fab:active{transform:scale(.92);box-shadow:0 2px 8px rgba(200,101,26,.25)}
/* Add Modal */
.sup-modal-overlay{
  display:none;position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;
}
.sup-modal-overlay.show{display:flex}
.sup-modal{
  background:var(--card);border-radius:var(--radius-lg);padding:20px;
  width:calc(100% - 48px);max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,.15);
}
.sup-modal h3{font-size:16px;margin:0 0 16px;color:var(--text)}
.sup-modal .field{margin-bottom:12px}
.sup-modal .field label{display:block;font-size:12px;color:var(--text3);margin-bottom:4px;font-weight:600}
.sup-modal .field input,.sup-modal .field select{
  width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius);
  font-size:14px;font-family:inherit;background:var(--bg);color:var(--text);box-sizing:border-box;
}
.sup-modal .field input:focus,.sup-modal .field select:focus{outline:none;border-color:var(--primary)}
.sup-modal .modal-actions{display:flex;gap:8px;margin-top:16px}
.sup-modal .modal-actions button{flex:1;padding:10px;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer}
.sup-modal .modal-actions .btn-cancel{background:var(--card);border:1.5px solid var(--border);color:var(--text2)}
.sup-modal .modal-actions .btn-confirm{background:var(--primary);border:none;color:#fff}
/* ===== Expenses Panel ===== */
.exp-summary{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;
}
.exp-sum-card{
  background:var(--card);border-radius:var(--radius);padding:14px;
  box-shadow:var(--shadow);text-align:center;
}
.exp-sum-card .sum-num{font-size:22px;font-weight:800;color:var(--primary)}
.exp-sum-card .sum-label{font-size:11px;color:var(--text3);margin-top:2px}
.exp-sum-card.full{grid-column:1/-1}
.exp-item{
  display:flex;align-items:center;gap:10px;padding:13px 14px;
  background:var(--card);border-radius:var(--radius);margin-bottom:8px;
  box-shadow:0 1px 3px rgba(0,0,0,.03);
}
.exp-item .exp-purpose{flex:1;font-size:14px;font-weight:500}
.exp-item .exp-amount{font-size:16px;font-weight:700;color:var(--primary);white-space:nowrap}
.exp-item .exp-payer{font-size:12px;color:var(--text2);white-space:nowrap}
.exp-item .exp-aa{
  display:inline-flex;align-items:center;gap:3px;padding:3px 8px;
  border-radius:10px;font-size:11px;font-weight:600;cursor:pointer;user-select:none;
}
.exp-item .exp-aa.in{background:var(--green-bg);color:var(--green)}
.exp-item .exp-aa.out{background:var(--red-bg);color:var(--red)}
/* ===== AA Panel ===== */
.aa-summary{display:flex;gap:10px;margin-bottom:14px}
.aa-sum-card{
  flex:1;background:var(--card);border-radius:var(--radius);padding:14px;
  box-shadow:var(--shadow);text-align:center;
}
.aa-sum-card .aa-num{font-size:20px;font-weight:800;color:var(--primary)}
.aa-sum-card .aa-label{font-size:11px;color:var(--text3);margin-top:2px}
.aa-party-card{
  background:var(--card);border-radius:var(--radius-lg);padding:16px;margin-bottom:10px;
  box-shadow:var(--shadow);
}
.aa-party-card .party-header{
  display:flex;align-items:center;gap:8px;margin-bottom:10px;
}
.aa-party-card .party-name{font-size:16px;font-weight:700;color:var(--text)}
.aa-party-card .party-members{font-size:12px;color:var(--text3)}
.aa-party-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px}
.aa-party-row .label{color:var(--text2)}
.aa-party-row .val{font-weight:600}
.aa-party-status{
  margin-top:8px;padding:8px 12px;border-radius:var(--radius);font-size:13px;font-weight:600;
}
.aa-party-status.receive{background:var(--green-bg);color:var(--green)}
.aa-party-status.pay{background:var(--red-bg);color:var(--red)}
.aa-party-status.zero{background:#f5f5f5;color:var(--text3)}
.aa-transfer{
  background:var(--card);border-radius:var(--radius-lg);padding:16px;
  margin-top:12px;box-shadow:var(--shadow);

<script>
/* ================================================================
   SUPABASE INTEGRATION
   ================================================================ */
var supabase = (function(){ return window.supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey); })();
var _supabaseReady = false;

/* ----- Auth ----- */
async function signInWithGitHub() {
  var res = await supabase.auth.signInWithOAuth({ provider: 'github' });
  if (res.error) console.error('登录失败:', res.error);
}

async function signOut() {
  await supabase.auth.signOut();
  _supabaseReady = false;
  localStorage.removeItem('supabase_migrated');
  location.reload();
}

async function getCurrentUser() {
  var res = await supabase.auth.getUser();
  return res.data ? res.data.user : null;
}

/* ----- Auth UI ----- */
function renderAuthUI() {
  supabase.auth.getSession().then(function(res) {
    var area = document.getElementById('authArea');
    if (!area) return;
    if (res.data.session) {
      var u = res.data.session.user;
      var m = u.user_metadata || {};
      var name = m.full_name || m.user_name || u.email || '用户';
      var av = m.avatar_url || '';
      var h = '';
      if (av) h += '<img src="' + esc(av) + '" style="width:26px;height:26px;border-radius:50%;flex-shrink:0" onerror="this.style.display=\'none\'">';
      h += '<span style="font-size:12px;font-weight:600;color:var(--text);max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(name) + '</span>';
      h += '<button class="btn btn-xs btn-outline" style="padding:3px 8px;font-size:11px" onclick="signOut()">退出</button>';
      area.innerHTML = h;
    } else {
      area.innerHTML = '<button class="btn btn-xs btn-primary" style="padding:4px 10px;font-size:12px;white-space:nowrap" onclick="signInWithGitHub()">GitHub 登录</button>';
    }
  });
}

/* ----- Auth State Listener ----- */
supabase.auth.onAuthStateChange(function(event, session) {
  if (event === 'SIGNED_IN') {
    _supabaseReady = true;
    migrateLocalDataToSupabase(session.user.id).then(function() {
      return loadPlansFromSupabase();
    }).then(function() {
      return loadTemplatesFromSupabase();
    }).then(function() {
      if (typeof currentTab !== 'undefined') switchTab(currentTab);
    }).catch(function(e) { console.error('SIGNED_IN handler error:', e); });
  } else if (event === 'SIGNED_OUT') {
    _supabaseReady = false;
    location.reload();
  }
  renderAuthUI();
});

/* ----- Migration ----- */
async function migrateLocalDataToSupabase(userId) {
  if (localStorage.getItem('supabase_migrated')) return;
  try {
    var lp = JSON.parse(localStorage.getItem('camping_plans') || '[]');
    for (var i = 0; i < lp.length; i++) {
      var p = lp[i], info = p.info || {};
      var row = {
        user_id: userId,
        name: info.name || p.name || '未命名',
        date: info.date || '待定',
        location: info.location || '待定',
        families: p.families || [],
        supplies: { familyGear: p.familyGear || {}, publicFood: p.publicFood || [], publicGear: p.publicGear || [], itinerary: p.itinerary || [], mapConfig: p.mapConfig || {} },
        expenses: p.expenses || [],
        tasks: p.tasks || [],
        budget: p.budget || 0,
        shopping_checked: p.shoppingChecked || {}
      };
      var r = await supabase.from('plans').insert(row).select();
      if (r.data && r.data[0]) p._supabase_id = r.data[0].id;
    }
    if (lp.length > 0) localStorage.setItem('camping_plans', JSON.stringify(lp));

    var lt = JSON.parse(localStorage.getItem('camping_gear_templates') || '[]');
    for (var j = 0; j < lt.length; j++) {
      await supabase.from('gear_templates').insert({
        name: lt[j].name,
        items: lt[j].categories || lt[j].items || []
      });
    }
    localStorage.setItem('supabase_migrated', 'true');
    console.log('数据迁移完成 (' + lp.length + ' plans, ' + lt.length + ' templates)');
  } catch(e) { console.error('迁移失败:', e); }
}

/* ----- Load from Supabase ----- */
async function loadPlansFromSupabase() {
  var user = await getCurrentUser();
  if (!user) return;
  var r = await supabase.from('plans').select('*').eq('user_id', user.id).order('created_at', { ascending: false });
  var plans = r.data || [];
  if (plans.length > 0) {
    var local = plans.map(function(p) {
      var s = p.supplies || {};
      return {
        _supabase_id: p.id, name: p.name,
        info: { name: p.name, date: p.date, location: p.location },
        families: p.families || [],
        familyGear: s.familyGear || {},
        publicFood: s.publicFood || [],
        publicGear: s.publicGear || [],
        itinerary: s.itinerary || [],
        mapConfig: s.mapConfig || { lng: 116.67, lat: 40.58, name: '北京怀柔白河湾' },
        expenses: p.expenses || [],
        tasks: p.tasks || [],
        budget: p.budget || 0,
        shoppingChecked: p.shopping_checked || {}
      };
    });
    localStorage.setItem('camping_plans', JSON.stringify(local));
    var active = parseInt(localStorage.getItem('camping_activePlan') || '0');
    if (isNaN(active) || active >= local.length) localStorage.setItem('camping_activePlan', '0');
  }
}

async function loadTemplatesFromSupabase() {
  var r = await supabase.from('gear_templates').select('*').order('created_at', { ascending: false });
  var tpls = r.data || [];
  if (tpls.length > 0) {
    var local = tpls.map(function(t) { return { _supabase_id: t.id, name: t.name, categories: t.items || [] }; });
    localStorage.setItem('camping_gear_templates', JSON.stringify(local));
  }
}

/* ----- Sync to Supabase (fire-and-forget from savePlans) ----- */
async function _syncPlansToSupabase() {
  if (!_supabaseReady) return;
  var user = await getCurrentUser();
  if (!user) return;
  var plans = JSON.parse(localStorage.getItem('camping_plans') || '[]');
  var r = await supabase.from('plans').select('id').eq('user_id', user.id);
  var existingIds = (r.data || []).map(function(p) { return p.id; });

  for (var i = 0; i < plans.length; i++) {
    var p = plans[i], info = p.info || {};
    var row = {
      user_id: user.id, name: info.name || p.name || '未命名', date: info.date || '待定', location: info.location || '待定',
      families: p.families || [],
      supplies: { familyGear: p.familyGear || {}, publicFood: p.publicFood || [], publicGear: p.publicGear || [], itinerary: p.itinerary || [], mapConfig: p.mapConfig || {} },
      expenses: p.expenses || [], tasks: p.tasks || [], budget: p.budget || 0, shopping_checked: p.shoppingChecked || {},
      updated_at: new Date().toISOString()
    };
    if (p._supabase_id) {
      await supabase.from('plans').update(row).eq('id', p._supabase_id);
      var idx = existingIds.indexOf(p._supabase_id);
      if (idx > -1) existingIds.splice(idx, 1);
    } else {
      var ins = await supabase.from('plans').insert(row).select();
      if (ins.data && ins.data[0]) {
        p._supabase_id = ins.data[0].id;
        localStorage.setItem('camping_plans', JSON.stringify(plans));
      }
    }
  }
  for (var j = 0; j < existingIds.length; j++) {
    await supabase.from('plans').delete().eq('id', existingIds[j]);
  }
}

/* ----- Async API (direct Supabase access) ----- */
async function fetchPlans() {
  var user = await getCurrentUser();
  if (!user) return [];
  var r = await supabase.from('plans').select('*').eq('user_id', user.id).order('created_at', { ascending: false });
  return r.data || [];
}

async function savePlan(plan) {
  var user = await getCurrentUser();
  if (!user) return null;
  var info = plan.info || {};
  var row = {
    user_id: user.id, name: info.name || plan.name, date: info.date, location: info.location,
    families: plan.families, supplies: { familyGear: plan.familyGear, publicFood: plan.publicFood, publicGear: plan.publicGear, itinerary: plan.itinerary, mapConfig: plan.mapConfig },
    expenses: plan.expenses, tasks: plan.tasks, budget: plan.budget, shopping_checked: plan.shoppingChecked
  };
  if (plan.id || plan._supabase_id) {
    row.updated_at = new Date().toISOString();
    var r = await supabase.from('plans').update(row).eq('id', plan.id || plan._supabase_id).select();
    return r.data ? r.data[0] : null;
  } else {
    var r = await supabase.from('plans').insert(row).select();
    return r.data ? r.data[0] : null;
  }
}

async function deletePlanFromSupabase(planId) {
  await supabase.from('plans').delete().eq('id', planId);
}

async function fetchGearTemplates() {
  var r = await supabase.from('gear_templates').select('*').order('created_at', { ascending: false });
  return r.data || [];
}

async function saveGearTemplate(template) {
  var r = await supabase.from('gear_templates').insert(template).select();
  return r.data ? r.data[0] : null;
}

async function deleteGearTemplateFromSupabase(id) {
  await supabase.from('gear_templates').delete().eq('id', id);
}

/* ================================================================
   DATA MODEL — MULTI-PLAN SUPPORT
   ================================================================ */
function readPlans(){
  try{var v=localStorage.getItem('camping_plans');return v?JSON.parse(v):[]}catch(e){return[]}
}
function savePlans(plans){
  try{localStorage.setItem('camping_plans',JSON.stringify(plans))}catch(e){}
  _syncPlansToSupabase().catch(function(e){console.error('Supabase sync:',e)});
}
function activePlanIdx(){
  var idx=parseInt(localStorage.getItem('camping_activePlan')||'0');if(isNaN(idx))idx=0;
  var plans=readPlans();if(idx>=plans.length)idx=0;return idx;
}
function setActivePlanIdx(idx){localStorage.setItem('camping_activePlan',String(idx))}
function getActivePlan(){
  var plans=readPlans();var idx=activePlanIdx();return plans[idx]||null;
}
function saveActivePlan(plan){
  var plans=readPlans();var idx=activePlanIdx();
  if(idx<plans.length){plans[idx]=plan;savePlans(plans)}
}

function exportData(){
  var plan=getActivePlan();
  if(!plan){T('暂无数据可导出');return;}
  var info=L('info',DEFAULT_INFO);
  var families=L('families',DEFAULT_FAMILIES);
  var expenses=L('expenses',[]);
  var data={
    plan:plan.name,
    info:info,
    families:families,
    supplies:plan.supplies||{},
    expenses:expenses,
    exportedAt:new Date().toISOString()
  };
  var json=JSON.stringify(data,null,2);
  var blob=new Blob([json],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download=(plan.name||'露营计划')+'.json';
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
  T('已导出');
}

// L / S — now proxy through active plan
function L(k,d){
  try{
    var p=getActivePlan();if(p&&(k in p))return p[k];
    // fallback: read raw localStorage (backward compat during migration)
    var v=localStorage.getItem('camping_'+k);return v?JSON.parse(v):d;
  }catch(e){return d}
}
function S(k,v){
  try{
    var p=getActivePlan();if(p){p[k]=v;saveActivePlan(p);return}
  }catch(e){}
  try{localStorage.setItem('camping_'+k,JSON.stringify(v))}catch(e){}
}

function switchPlan(idx){
  var plans=readPlans();
  if(idx<0||idx>=plans.length)return;
  setActivePlanIdx(idx);
  weatherData=null;
  // Update header
  renderPlanHeader();
  // Refresh visible panels
  if(currentTab==='overview')renderOverview();
  else if(currentTab==='supplies'){renderSupplies();}
  else if(currentTab==='expenses')renderExpenses();
  else if(currentTab==='aa')renderAA();
  else if(currentTab==='share')renderShare();
  else if(currentTab==='home')renderHome();
}

function deletePlan(idx){
  var plans=readPlans();
  if(plans.length<=1){T('至少保留一个计划，无法删除');return}
  if(idx<0||idx>=plans.length)return;
  var active=activePlanIdx();
  plans.splice(idx,1);
  savePlans(plans);
  if(active>=plans.length)active=plans.length-1;
  if(active===idx&&idx>=plans.length)active=plans.length-1;
  else if(active>idx)active--;
  setActivePlanIdx(active);
  weatherData=null;
  if(currentTab==='overview')renderOverview();
  else if(currentTab==='supplies')renderSupplies();
  else if(currentTab==='expenses')renderExpenses();
  else if(currentTab==='aa')renderAA();
  else if(currentTab==='share')renderShare();
  else if(currentTab==='home')renderHome();
  T('计划已删除');
}

function exportPlan(idx){
  var plans=readPlans();
  if(idx<0||idx>=plans.length)return;
  var plan=deepClone(plans[idx]);
  var json=JSON.stringify(plan,null,2);
  var blob=new Blob([json],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  var safeDate=plan.info.date.replace(/[\\\/:*?"<>|]/g,'-');
  a.download='露营计划_'+plan.info.name+'_'+safeDate+'.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  T('计划已导出');
}

function importPlan(){
  var input=document.getElementById('importFileInput');
  if(!input){
    input=document.createElement('input');
    input.type='file';
    input.accept='.json';
    input.id='importFileInput';
    input.style.display='none';
    input.onchange=function(e){
      var file=e.target.files[0];
      if(!file)return;
      var reader=new FileReader();
      reader.onload=function(ev){
        try{
          var plan=JSON.parse(ev.target.result);
          if(!plan.info||!plan.name||!plan.families){
            T('无效的计划文件，缺少必要字段');
            return;
          }
          var plans=readPlans();
          plans.push(plan);
          savePlans(plans);
          setActivePlanIdx(plans.length-1);
          weatherData=null;
          T('计划已导入');
          renderHome();
          if(currentTab!=='home'){switchTab(currentTab);}
        }catch(err){
          T('文件解析失败，请检查文件格式');
        }
      };
      reader.readAsText(file);
      input.value='';
    };
    document.body.appendChild(input);
  }
  input.click();
}

var WMO_CODES = {
  0:'☀️ 晴天',1:'🌤️ 少云',2:'🌤️ 少云',3:'🌤️ 少云',
  45:'🌫️ 雾',48:'🌫️ 雾',
  51:'🌧️ 小雨',53:'🌧️ 小雨',55:'🌧️ 小雨',
  61:'🌧️ 雨',63:'🌧️ 雨',65:'🌧️ 雨',
  71:'❄️ 雪',73:'❄️ 雪',75:'❄️ 雪',77:'❄️ 雪',
  80:'🌧️ 阵雨',81:'🌧️ 阵雨',82:'🌧️ 阵雨',
  95:'⛈️ 雷暴',96:'⛈️ 雷暴',99:'⛈️ 雷暴'
};
var DAY_NAMES = ['周日','周一','周二','周三','周四','周五','周六'];

function weatherDesc(code){return WMO_CODES[code]||'🌤️ 多云'}
function weatherIconOnly(code){
  var d=weatherDesc(code);return d.split(' ')[0];
}

function fetchWeather(){
  if(weatherLoading)return;
  weatherLoading=true;
  var plan=getActivePlan();
  if(!plan||!plan.mapConfig){weatherLoading=false;return}
  var mapConfig=plan.mapConfig;
  renderWeatherCard();
  var url='https://api.open-meteo.com/v1/forecast?latitude='+mapConfig.lat+'&longitude='+mapConfig.lng+'&current=temperature_2m,weather_code,wind_speed_10m,relative_humidity_2m&daily=temperature_2m_max,temperature_2m_min,weather_code,precipitation_probability_max&timezone=auto&forecast_days=4';
  fetch(url).then(function(r){
    if(!r.ok)throw new Error('HTTP '+r.status);
    return r.json();
  }).then(function(data){
    weatherData=data;
    weatherLoading=false;
    if(currentTab==='overview')renderWeatherCard();
  }).catch(function(err){
    weatherLoading=false;
    weatherData='error';
    if(currentTab==='overview')renderWeatherCard();
  });
}

function renderWeatherCard(){
  var container=document.getElementById('weatherCardContainer');
  if(!container)return;

  // Loading skeleton
  if(weatherLoading && !weatherData){
    container.innerHTML='<div class="skeleton-line skeleton-line-lg"></div><div class="skeleton-line"></div><div class="skeleton-row"><div class="skeleton-day"></div><div class="skeleton-day"></div><div class="skeleton-day"></div></div>';
    return;
  }

  // Error state
  if(weatherData==='error'){
    container.innerHTML='<div class="weather-error">⚠️ 天气加载失败 <span class="retry-link" onclick="fetchWeather()">点击重试</span></div>';
    return;
  }

  // Success state
  if(!weatherData||!weatherData.current||!weatherData.daily)return;

  var c=weatherData.current;
  var d=weatherData.daily;
  var html='';

  // Current
  html+='<div class="weather-current">';
  html+='<div class="weather-temp-main">'+Math.round(c.temperature_2m)+'°</div>';
  html+='<div class="weather-curr-info">';
  html+='<div class="weather-desc">'+weatherDesc(c.weather_code)+'</div>';
  html+='<div class="weather-details">';
  html+='<span>💧 '+c.relative_humidity_2m+'%</span>';
  html+='<span>💨 '+c.wind_speed_10m+' km/h</span>';
  html+='</div></div></div>';

  // Forecast
  html+='<div class="weather-forecast">';
  for(var i=1;i<4&&i<d.time.length;i++){
    var date=new Date(d.time[i]+'T00:00:00');
    var dayName=DAY_NAMES[date.getDay()];
    html+='<div class="weather-day">';
    html+='<div class="day-name">'+dayName+'</div>';
    html+='<div class="day-icon">'+weatherIconOnly(d.weather_code[i])+'</div>';
    html+='<div class="day-temps"><span>'+Math.round(d.temperature_2m_max[i])+'°</span> <span class="low">'+Math.round(d.temperature_2m_min[i])+'°</span></div>';
    html+='</div>';
  }
  html+='</div>';

  container.innerHTML=html;
}

  weatherData=null;renderOverview();T('地图已更新');
}

function saveFamily(idx){
  var families=L('families',DEFAULT_FAMILIES);
  var oldName=families[idx].name;
  var newName=document.getElementById('mFamName').value.trim();
  if(!newName){T('请输入家庭名称');return}
  var memberInputs=document.querySelectorAll('#mFamMembers input');
  var members=[];
  memberInputs.forEach(function(inp){var v=inp.value.trim();if(v)members.push(v)});
  if(members.length===0){T('请至少添加一名成员');return}
  if(newName!==oldName)updateFamilyReferences(oldName,newName);
  families[idx].name=newName;
  families[idx].members=members;
  saveActivePlan(getActivePlan());
  closeModal();renderOverview();renderSupplies();
  T('家庭已更新');
}

function deleteFamily(idx){
  var plan=getActivePlan();if(!plan)return;
  var families=plan.families;
  var name=families[idx].name;
  families.splice(idx,1);
  if(plan.familyGear){delete plan.familyGear[name]}
  saveActivePlan(plan);
  renderOverview();renderSupplies();
  T('已删除家庭：'+name);
}

function createFamily(){
  var plan=getActivePlan();if(!plan)return;
  var newName=document.getElementById('mFamName').value.trim();
  if(!newName){T('请输入家庭名称');return}
  var memberInputs=document.querySelectorAll('#mFamMembers input');
  var members=[];
  memberInputs.forEach(function(inp){var v=inp.value.trim();if(v)members.push(v)});
  if(members.length===0){T('请至少添加一名成员');return}
  plan.families.push({name:newName,members:members});
  if(!plan.familyGear)plan.familyGear={};
  plan.familyGear[newName]=DEFAULT_GEAR_CATEGORIES.map(function(c){return {cat:c,items:[]}});
  saveActivePlan(plan);
  closeModal();renderOverview();renderSupplies();
  T('家庭已添加');
}

function addMemberInput(containerId){
  var container=document.getElementById(containerId);
  var row=document.createElement('div');
  row.className='fam-member-row';
  row.style.cssText='display:flex;gap:6px;margin-bottom:6px';
  row.innerHTML='<input style="flex:1" placeholder="成员姓名"><button class="btn btn-xs btn-outline" style="color:var(--red);border-color:var(--red)" onclick="removeMemberInput(this)">×</button>';
  container.appendChild(row);
}

function removeMemberInput(btn){
  var rows=btn.closest('#mFamMembers').querySelectorAll('.fam-member-row');
  if(rows.length<=1){T('至少保留一名成员');return}
  btn.parentElement.remove();
}

function updateFamilyReferences(oldName,newName){
  var plan=getActivePlan();if(!plan)return;
  // familyGear
  if(plan.familyGear&&plan.familyGear[oldName]){plan.familyGear[newName]=plan.familyGear[oldName];delete plan.familyGear[oldName]}
  // expenses
  if(plan.expenses){plan.expenses.forEach(function(e){if(e.payer===oldName)e.payer=newName})}
  // publicFood
  if(plan.publicFood){plan.publicFood.forEach(function(cat){cat.items.forEach(function(item){if(item.assignee===oldName)item.assignee=newName})})}
  // publicGear
  if(plan.publicGear){plan.publicGear.forEach(function(cat){cat.items.forEach(function(item){if(item.assignee===oldName)item.assignee=newName})})}
  saveActivePlan(plan);
}

function countAllSupplies(){
  var n=0;
  var fg=L('familyGear',DEFAULT_FAMILY_GEAR);
  Object.values(fg).forEach(function(cats){cats.forEach(function(c){n+=c.items.length})});
  var pf=L('publicFood',DEFAULT_PUBLIC_FOOD);
  pf.forEach(function(c){n+=c.items.length});
  var pg=L('publicGear',DEFAULT_PUBLIC_GEAR);
  pg.forEach(function(c){n+=c.items.length});
  return n;
}

function switchSuppliesSub(sub){suppliesFilter='all';suppliesSubtab=sub;renderSupplies();}

function renderSuppliesContent(){
  var container=document.getElementById('supContent');
  if(!container)return;
  var html='';

  if(suppliesSubtab==='family'){
    var fg=L('familyGear',DEFAULT_FAMILY_GEAR);
    var families=L('families',DEFAULT_FAMILIES);

    // Flatten: collect all items by category, across families
    var catMap={};
    Object.keys(fg).forEach(function(fam){
      var cats=fg[fam]||[];
      cats.forEach(function(cat){
        if(!catMap[cat.cat])catMap[cat.cat]=[];
        cat.items.forEach(function(item){
          if(suppliesFilter!=='all'&&suppliesFilter!==fam)return;
          catMap[cat.cat].push({family:fam,item:item});
        });
      });
    });

    var catsOrder=Object.keys(catMap);
    if(catsOrder.length===0){
      html='<div style="text-align:center;padding:40px;color:var(--text3)">暂无物资，点击右下角 ＋ 添加</div>';
    } else {
      catsOrder.forEach(function(cat,ci){
        if(ci>0)html+='<div class="sup-divider"></div>';
        html+='<div class="sup-cat-header">'+esc(cat)+'</div>';
        catMap[cat].forEach(function(entry){
          var item=entry.item,fam=entry.family;
          html+='<div class="sup-item'+(item.checked?' done':'')+'">';
          html+='<input type="checkbox" '+(item.checked?'checked':'')+' onchange="toggleFamilyItemCheck(\''+esc(fam)+'\',\''+esc(cat)+'\',\''+esc(item.name)+'\',this.checked)">';
          html+='<div class="item-info">';
          html+='<span class="item-name'+(item.checked?' done-name':'')+'">'+esc(item.name)+'</span>';
          if(item.qty)html+='<span class="item-qty">'+esc(item.qty)+'</span>';
          html+='</div>';
          html+='<span class="item-tag">'+esc(fam)+'</span>';
          if(item.checked)html+='<span class="item-status">√已备</span>';
          html+='<div class="item-actions">';
          html+='<button class="btn-icon" onclick="openEditModal(\'family\',\''+esc(fam)+'\',\''+esc(cat)+'\',\''+esc(item.name)+'\')" title="编辑">✏️</button>';
          html+='<button class="btn-icon danger" onclick="deleteFamilyItemByName(\''+esc(fam)+'\',\''+esc(cat)+'\',\''+esc(item.name)+'\')" title="删除">🗑️</button>';
          html+='</div></div>';
        });
      });
    }

  } else {
    var list=suppliesSubtab==='food'?L('publicFood',DEFAULT_PUBLIC_FOOD):L('publicGear',DEFAULT_PUBLIC_GEAR);

    if(list.length===0){
      html='<div style="text-align:center;padding:40px;color:var(--text3)">暂无物资，点击右下角 ＋ 添加</div>';
    } else {
      list.forEach(function(cat,ci){
        html+='<div class="sup-cat-header">'+esc(cat.cat)+'</div>';
        cat.items.forEach(function(item,i){
          if(suppliesFilter!=='all'&&suppliesFilter!==item.assignee)return;
          html+='<div class="sup-item'+(item.checked?' done':'')+'">';
          html+='<input type="checkbox" '+(item.checked?'checked':'')+' onchange="togglePublicItemCheck('+ci+','+i+',this.checked)">';
          html+='<div class="item-info">';
          html+='<span class="item-name'+(item.checked?' done-name':'')+'">'+esc(item.name)+'</span>';
          if(item.qty)html+='<span class="item-qty">'+esc(item.qty)+'</span>';
          html+='</div>';
          html+='<span class="item-tag">'+esc(item.assignee)+'</span>';
          if(item.checked)html+='<span class="item-status">√已备</span>';
          html+='<div class="item-actions">';
          html+='<button class="btn-icon" onclick="openEditModal(\'public\','+ci+','+i+')" title="编辑">✏️</button>';
          html+='<button class="btn-icon danger" onclick="deletePublicItem('+ci+','+i+')" title="删除">🗑️</button>';
          html+='</div></div>';
        });

      });

  container.innerHTML=html||'<div style="text-align:center;padding:40px;color:var(--text3)">暂无物资，点击右下角 ＋ 添加</div>';

  var cm=document.getElementById('supCatManage');

}

function updateSuppliesProgress(){
  var el=document.getElementById('supProgress');if(!el)return;
  if(suppliesSubtab==='family'){
    el.style.display='inline-flex';
    var total=0,checked=0;
    var fg=L('familyGear',DEFAULT_FAMILY_GEAR);
    Object.values(fg).forEach(function(cats){
      cats.forEach(function(cat){
        cat.items.forEach(function(item){total++;if(item.checked)checked++;});
      });
    });
    el.textContent=checked+'/'+total+' 已备';
  } else {
    var key=suppliesSubtab==='food'?'publicFood':'publicGear';
    var list=L(key,suppliesSubtab==='food'?DEFAULT_PUBLIC_FOOD:DEFAULT_PUBLIC_GEAR);
    var total=0,checked=0;
    list.forEach(function(cat){
      cat.items.forEach(function(item){total++;if(item.checked)checked++;});
    });
    if(total>0){el.style.display='inline-flex';el.textContent=checked+'/'+total+' 已备'}
    else{el.style.display='none'}
  }
}

function toggleFamilyItemCheck(fam,cat,name,checked){
  var fg=L('familyGear',DEFAULT_FAMILY_GEAR);
  if(fg[fam]){
    var catObj=fg[fam].find(function(c){return c.cat===cat});
    if(catObj){
      var item=catObj.items.find(function(it){return it.name===name});
      if(item){item.checked=checked;S('familyGear',fg)}
    }
  }
  renderSuppliesContent();updateSuppliesProgress();
}

function deleteFamilyItemByName(fam,cat,name){
  var fg=L('familyGear',DEFAULT_FAMILY_GEAR);
  if(fg[fam]){
    var catObj=fg[fam].find(function(c){return c.cat===cat});
    if(catObj){
      catObj.items=catObj.items.filter(function(it){return it.name!==name});
      S('familyGear',fg)
    }
  }
  renderSuppliesContent();updateSuppliesProgress();renderOverview();
}

function deletePublicItem(ci,ii){
  var key=suppliesSubtab==='food'?'publicFood':'publicGear';
  var list=L(key,suppliesSubtab==='food'?DEFAULT_PUBLIC_FOOD:DEFAULT_PUBLIC_GEAR);
  list[ci].items.splice(ii,1);
  S(key,list);renderSuppliesContent();renderOverview();
}

function togglePublicItemCheck(ci,ii,checked){
  var key=suppliesSubtab==='food'?'publicFood':'publicGear';
  var list=L(key,suppliesSubtab==='food'?DEFAULT_PUBLIC_FOOD:DEFAULT_PUBLIC_GEAR);
  if(list[ci]&&list[ci].items[ii]){list[ci].items[ii].checked=checked;S(key,list)}
  renderSuppliesContent();updateSuppliesProgress();
}

function saveNewCategory(){
  var catName=document.getElementById('mCatName').value.trim();
  if(!catName){T('请输入分类名称');return}
  var plan=getActivePlan();if(!plan)return;
  if(!plan.familyGear)plan.familyGear={};
  var families=plan.families||[];
  families.forEach(function(f){
    var cats=plan.familyGear[f.name]||[];
    if(!cats.some(function(c){return c.cat===catName})){
      cats.push({cat:catName,items:[]});
    }
    plan.familyGear[f.name]=cats;
  });
  saveActivePlan(plan);
  closeModal();renderSuppliesContent();renderOverview();
  T('分类「'+catName+'」已添加');
}

function deleteCategory(catName){
  if(!confirm('确定删除分类「'+catName+'」？所有家庭中该分类下的物品将被移除。'))return;
  var plan=getActivePlan();if(!plan)return;
  if(!plan.familyGear)return;
  Object.keys(plan.familyGear).forEach(function(fam){
    plan.familyGear[fam]=plan.familyGear[fam].filter(function(c){return c.cat!==catName});
  });
  saveActivePlan(plan);
  renderSuppliesContent();renderOverview();
  T('分类「'+catName+'」已删除');
}

/* ================================================================
   AA (EXPENSE SPLITTING)
   ================================================================ */
function renderAA(){
  var expenses=L('expenses',DEFAULT_EXPENSES);
  var families=L('families',DEFAULT_FAMILIES);
  var aaExpenses=expenses.filter(function(e){return e.inAA});
  var totalAA=aaExpenses.reduce(function(s,e){return s+e.amount},0);

  var html='';
  // Sub-tabs
  html+='<div class="sup-subtabs">';
  html+='<div class="sup-subtab'+(aaMode==='family'?' active':'')+'" onclick="aaMode=\'family\';renderAA()">🏠 按家庭均摊</div>';
  html+='<div class="sup-subtab'+(aaMode==='person'?' active':'')+'" onclick="aaMode=\'person\';renderAA()">👤 按人头均摊</div>';
  html+='</div>';

  // Summary
  var nUnits=aaMode==='family'?families.length:families.reduce(function(s,f){return s+f.members.length},0);
  var perUnit=totalAA/nUnits;
  html+='<div class="aa-summary">';
  html+='<div class="aa-sum-card"><div class="aa-num">&yen;'+totalAA.toFixed(0)+'</div><div class="aa-label">AA总金额</div></div>';
  html+='<div class="aa-sum-card"><div class="aa-num">&yen;'+perUnit.toFixed(0)+'</div><div class="aa-label">每'+(aaMode==='family'?'方':'人')+'均摊</div></div>';
  html+='<div class="aa-sum-card"><div class="aa-num">'+nUnits+'</div><div class="aa-label">结算单元</div></div>';
  html+='</div>';

  // Build person→family mapping
  var personToFamily={};
  families.forEach(function(f){
    f.members.forEach(function(m){personToFamily[m]=f.name});
  });

  // Per-party calculation
  var partyData={};
  families.forEach(function(f){
    var advanced=0;
    aaExpenses.forEach(function(e){
      var famName=personToFamily[e.payer]||e.payer;
      if(famName===f.name)advanced+=e.amount;
    });
    var share=aaMode==='family'?perUnit:perUnit*f.members.length;
    partyData[f.name]={advanced:advanced,share:share,net:advanced-share,members:f.members};
  });

  // Party cards
  Object.keys(partyData).forEach(function(name){
    var d=partyData[name];
    html+='<div class="aa-party-card">';
    html+='<div class="party-header"><span class="party-name">🏕️ '+esc(name)+'</span>';
    html+='<span class="party-members">'+d.members.map(function(m){return esc(m)}).join('、')+' ('+d.members.length+'人)</span></div>';
    html+='<div class="aa-party-row"><span class="label">垫付金额</span><span class="val">&yen;'+d.advanced.toFixed(2)+'</span></div>';
    html+='<div class="aa-party-row"><span class="label">应摊金额</span><span class="val">&yen;'+d.share.toFixed(2)+'</span></div>';
    if(Math.abs(d.net)<0.01){
      html+='<div class="aa-party-status zero">✅ 已平账，无需结算</div>';
    } else if(d.net>0){
      html+='<div class="aa-party-status receive">💚 待收款 &yen;'+d.net.toFixed(2)+'</div>';
    } else {
      html+='<div class="aa-party-status pay">❤️ 待付款 &yen;'+Math.abs(d.net).toFixed(2)+'</div>';
    }
    html+='</div>';
  });

  // Transfer plan — minimum transfer count via sorted greedy
  var debtors=[],creditors=[];
  Object.keys(partyData).forEach(function(name){
    var d=partyData[name];
    if(d.net<-0.001)debtors.push({name:name,amount:Math.round(Math.abs(d.net)*100)/100});
    else if(d.net>0.001)creditors.push({name:name,amount:Math.round(d.net*100)/100});
  });
  // Sort by amount descending for optimal (minimum) transfer count
  debtors.sort(function(a,b){return b.amount-a.amount});
  creditors.sort(function(a,b){return b.amount-a.amount});

  if(debtors.length>0&&creditors.length>0){
    html+='<div class="aa-transfer"><h4>💳 转账方案</h4>';
    var di=0,ci=0;
    while(di<debtors.length&&ci<creditors.length){
      var d=debtors[di],c=creditors[ci];
      var transfer=Math.min(d.amount,c.amount);
      html+='<div class="aa-transfer-item">';
      html+='<span class="from">'+esc(d.name)+'</span> <span class="arrow-tf">→</span> <span class="to">'+esc(c.name)+'</span>';
      html+='<span class="amount-tf">&yen;'+transfer.toFixed(2)+'</span></div>';
      d.amount-=transfer;c.amount-=transfer;
      if(d.amount<0.001)di++;
      if(c.amount<0.001)ci++;
    }
    html+='</div>';
  } else {
    if(totalAA===0){
      html+='<div style="text-align:center;padding:20px;color:var(--text3)">暂无 AA 费用，请先在 💰花费 中添加计入AA的支出</div>';
    } else {
      html+='<div style="text-align:center;padding:20px;color:var(--text3)">所有费用已平账 ✅</div>';
    }
  }

  document.getElementById('panel-aa').innerHTML=html;
}

  aaExpenses.forEach(function(e){text+='    '+esc(e.purpose)+' ¥'+e.amount.toFixed(2)+'（'+esc(e.payer)+'垫付）\n'});
  text+='\n💳 垫付 & 转账方案：\n';
  Object.keys(partyData).forEach(function(n){
    var d=partyData[n];
    if(d.net>0.001)text+='  💚 '+esc(n)+' 垫付 ¥'+d.advanced.toFixed(2)+'，待收款 ¥'+d.net.toFixed(2)+'\n';
    else if(d.net<-0.001)text+='  ❤️ '+esc(n)+' 垫付 ¥'+d.advanced.toFixed(2)+'，待付款 ¥'+Math.abs(d.net).toFixed(2)+'\n';
    else text+='  ✅ '+esc(n)+' 已平账\n';
  });
  if(debtors.length>0&&creditors.length>0){
    text+='\n  转账方案：\n';
    var di=0,ci=0,td=JSON.parse(JSON.stringify(debtors)),tc=JSON.parse(JSON.stringify(creditors));
    while(di<td.length&&ci<tc.length){
      var transfer=Math.min(td[di].amount,tc[ci].amount);
      text+='    '+esc(td[di].name)+' → '+esc(tc[ci].name)+'：¥'+transfer.toFixed(2)+'\n';
      td[di].amount-=transfer;tc[ci].amount-=transfer;
      if(td[di].amount<0.001)di++;if(tc[ci].amount<0.001)ci++;
    }
  }

  // Unprepared items
  var unprepared=[];
  Object.keys(fg).forEach(function(fam){
    (fg[fam]||[]).forEach(function(cat){
      cat.items.forEach(function(item){
        if(!item.checked)unprepared.push(fam+' - '+item.name);
      });
    });
  });

  var html='';
  html+='<div class="share-actions">';
  html+='<button class="btn btn-primary" style="flex:1" onclick="copyShareText()">📋 复制文案</button>';
  html+='</div>';

  html+='<div class="share-preview">';
  var lines=text.split('\n');
  lines.forEach(function(line){
    if(line.startsWith('【'))html+='<div class="msg-title">'+esc(line)+'</div>';
    else if(line.match(/^[📅👨📦🍖⛺💰💳]/))html+='<div class="msg-h3">'+esc(line)+'</div>';
    else if(line.trim())html+=esc(line)+'<br>';
    else html+='<br>';
  });
  html+='</div>';

  if(unprepared.length>0){
    html+='<div class="share-tips"><strong>⚠️ 尚未准备的物品：</strong><br>'+unprepared.map(function(u){return '· '+esc(u)}).join('<br>')+'</div>';
  }

  html+='<div class="share-watermark">📱 由「露营小助手」生成</div>';

  document.getElementById('panel-share').innerHTML=html;
  window._shareText=text;
}

function copyShareText(){
  var text=window._shareText||'';
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(function(){T('已复制到剪贴板')}).catch(function(){T('复制失败，请手动复制')});
  } else {
    var ta=document.createElement('textarea');ta.value=text;
    ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);
    ta.select();document.execCommand('copy');document.body.removeChild(ta);T('已复制到剪贴板');
  }
}

/* ================================================================
   SHOPPING LIST
   ================================================================ */
function generateShoppingList(){
  var plan=getActivePlan();if(!plan)return;
  var fg=plan.familyGear||{};
  var pf=plan.publicFood||[];
  var pg=plan.publicGear||[];

  var items=[];
  Object.keys(fg).forEach(function(fam){
    (fg[fam]||[]).forEach(function(cat){
      cat.items.forEach(function(item){
        if(!item.checked)items.push({name:item.name,qty:item.qty||'1',source:fam+' 自带',cat:cat.cat});
      });
    });
  });
  pf.forEach(function(cat){
    cat.items.forEach(function(item){
      if(!item.checked)items.push({name:item.name,qty:item.qty||'1',source:'公共食材',cat:cat.cat});
    });
  });
  pg.forEach(function(cat){
    cat.items.forEach(function(item){
      if(!item.checked)items.push({name:item.name,qty:item.qty||'1',source:'公共装备',cat:cat.cat});
    });
  });

  if(items.length===0){T('所有物品已备齐，无需购物');return;}

  if(!plan.shoppingChecked)plan.shoppingChecked={};
  var sc=plan.shoppingChecked;

  var grouped={};
  items.forEach(function(it){
    var key=it.cat+'|||'+it.name;
    if(!grouped[key]){grouped[key]={name:it.name,cat:it.cat,sources:[],qtyStr:''};}
    if(grouped[key].sources.indexOf(it.source)===-1)grouped[key].sources.push(it.source);
    if(it.qty)grouped[key].qtyStr=it.qty;
  });

  var cats={};
  Object.values(grouped).forEach(function(g){
    if(!cats[g.cat])cats[g.cat]=[];
    cats[g.cat].push(g);
  });

  var html='';
  var totalItems=0,totalChecked=0;
  Object.keys(cats).forEach(function(catName){
    html+='<div class="shop-cat-title">📌 '+esc(catName)+'</div>';
    cats[catName].forEach(function(g){
      var itemKey=g.cat+'_'+g.name;
      var isChecked=sc[itemKey];
      totalItems++;if(isChecked)totalChecked++;
      html+='<div class="shop-item">';
      html+='<input type="checkbox" '+(isChecked?'checked':'')+' onchange="toggleShoppingItem(\''+esc(itemKey)+'\',this.checked)">';
      html+='<div class="shop-info"><div class="shop-name'+(isChecked?' done':'')+'">'+esc(g.name)+'</div>';
      html+='<div class="shop-meta">'+esc(g.qtyStr)+'</div></div>';
      html+='<span class="shop-source">'+esc(g.sources.join('、'))+'</span>';
      html+='</div>';
    });
  });

  html+='<div class="shop-stats">已购 '+totalChecked+'/'+totalItems+' 项</div>';
  openModal('🛒 购物清单',html);
}

function toggleShoppingItem(key,checked){
  var plan=getActivePlan();if(!plan)return;
  if(!plan.shoppingChecked)plan.shoppingChecked={};
  plan.shoppingChecked[key]=checked;
  saveActivePlan(plan);
  generateShoppingList();
}

/* ================================================================
   TASKS
   ================================================================ */
function renderTasks(){
  var plan=getActivePlan();if(!plan)return'';
  var tasks=plan.tasks||[];
  var families=plan.families||DEFAULT_FAMILIES;

  var html='<div class="card task-card"><div class="card-title">📋 任务分配';
  html+='<button class="btn btn-xs btn-outline" style="margin-left:auto" onclick="showTaskAddForm()">+ 添加任务</button></div>';

  tasks.forEach(function(t,i){
    html+='<div class="task-item">';
    html+='<input type="checkbox" '+(t.done?'checked':'')+' onchange="toggleTask('+i+',this.checked)">';
    html+='<span class="task-text'+(t.done?' done':'')+'">'+esc(t.text)+'</span>';
    html+='<span class="task-pill" style="background:'+(supFamilyColors[t.assignee]||'#888')+'">'+esc(t.assignee)+'</span>';
    html+='<button class="btn-icon danger" onclick="deleteTask('+i+')">🗑️</button>';
    html+='</div>';
  });

  html+='<div class="task-add-row" id="taskAddRow" style="display:none">';
  html+='<input id="taskAddText" placeholder="任务内容">';
  html+='<select id="taskAddAssignee">';
  families.forEach(function(f){html+='<option value="'+esc(f.name)+'">'+esc(f.name)+'</option>'});
  html+='</select>';
  html+='<button class="btn btn-xs btn-primary" onclick="addTask()">确认</button>';
  html+='<button class="btn btn-xs btn-outline" onclick="hideTaskAddForm()">取消</button>';
  html+='</div></div>';
  return html;
}

function showTaskAddForm(){document.getElementById('taskAddRow').style.display='flex';}
function hideTaskAddForm(){document.getElementById('taskAddRow').style.display='none';document.getElementById('taskAddText').value='';}
function addTask(){
  var text=document.getElementById('taskAddText').value.trim();
  if(!text)return;
  var plan=getActivePlan();if(!plan)return;
  if(!plan.tasks)plan.tasks=[];
  plan.tasks.push({text:text,assignee:document.getElementById('taskAddAssignee').value,done:false});
  saveActivePlan(plan);
  renderOverview();
}
function toggleTask(i,checked){
  var plan=getActivePlan();if(!plan)return;
  if(plan.tasks&&plan.tasks[i]){plan.tasks[i].done=checked;saveActivePlan(plan);}
  renderOverview();
}
function deleteTask(i){
  var plan=getActivePlan();if(!plan)return;
  if(plan.tasks){plan.tasks.splice(i,1);saveActivePlan(plan);}
  renderOverview();
}

   EQUIPMENT TEMPLATES
   ================================================================ */
function getTemplates(){
  try{var v=localStorage.getItem('camping_gear_templates');return v?JSON.parse(v):[]}catch(e){return[]}
}
function saveTemplates(arr){try{localStorage.setItem('camping_gear_templates',JSON.stringify(arr))}catch(e){}}

function saveTemplateModal(){
  var plan=getActivePlan();if(!plan)return;
  var fg=plan.familyGear||{};
  var pf=plan.publicFood||[];
  var pg=plan.publicGear||[];

  var preview='<div style="max-height:300px;overflow-y:auto;margin-bottom:12px;font-size:13px">';
  var totalCount=0;

  Object.keys(fg).forEach(function(fam){
    preview+='<div style="font-weight:600;color:var(--primary);margin-top:8px">🏕️ '+esc(fam)+' 自带</div>';
    (fg[fam]||[]).forEach(function(cat){
      cat.items.forEach(function(it){
        preview+='<div style="padding:2px 0;color:var(--text2)">'+esc(it.name)+(it.qty?' ×'+esc(it.qty):'')+' ['+esc(cat.cat)+']</div>';
        totalCount++;
      });
    });
  });

  preview+='<div style="font-weight:600;color:var(--primary);margin-top:8px">🍖 公共食材</div>';
  pf.forEach(function(cat){
    cat.items.forEach(function(it){
      preview+='<div style="padding:2px 0;color:var(--text2)">'+esc(it.name)+' ×'+esc(it.qty)+' ['+esc(cat.cat)+']</div>';
      totalCount++;
    });
  });

  preview+='<div style="font-weight:600;color:var(--primary);margin-top:8px">⛺ 公共装备</div>';
  pg.forEach(function(cat){
    cat.items.forEach(function(it){
      preview+='<div style="padding:2px 0;color:var(--text2)">'+esc(it.name)+' ×'+esc(it.qty)+' ['+esc(cat.cat)+']</div>';
      totalCount++;
    });
  });
  preview+='</div>';
  preview+='<div style="font-size:12px;color:var(--text3);margin-bottom:12px">共 '+totalCount+' 件物品</div>';

  if(totalCount===0){T('当前计划无物资可保存');return;}

  var html=preview;
  html+=modalField('模板名称','<input id="mTmplName" placeholder="如：夏季露营基础装备">');
  html+='<div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">取消</button>';
  html+='<button class="btn btn-primary" onclick="doSaveTemplate()">💾 保存模板</button></div>';
  openModal('💾 保存为模板',html);
}

function doSaveTemplate(){
  var name=document.getElementById('mTmplName').value.trim();
  if(!name){T('请输入模板名称');return;}

  var plan=getActivePlan();if(!plan)return;
  var fg=plan.familyGear||{};
  var pf=plan.publicFood||[];
  var pg=plan.publicGear||[];

  var categories=[];

  Object.keys(fg).forEach(function(fam){
    (fg[fam]||[]).forEach(function(cat){
      var items=cat.items.map(function(it){return {name:it.name,quantity:it.qty||''}});
      if(items.length>0)categories.push({cat:'['+fam+'] '+cat.cat,items:items});
    });
  });

  pf.forEach(function(cat){
    var items=cat.items.map(function(it){return {name:it.name,quantity:it.qty}});
    if(items.length>0)categories.push({cat:'🍖 '+cat.cat,items:items});
  });

  pg.forEach(function(cat){
    var items=cat.items.map(function(it){return {name:it.name,quantity:it.qty}});
    if(items.length>0)categories.push({cat:'⛺ '+cat.cat,items:items});
  });

  var templates=getTemplates();
  templates.push({name:name,categories:categories});
  saveTemplates(templates);
  closeModal();T('模板「'+name+'」已保存');
}

function loadTemplateModal(){
  var templates=getTemplates();
  if(templates.length===0){T('暂无已保存的模板');return;}

  var html='';
  templates.forEach(function(tmpl,i){
    var nItems=0;tmpl.categories.forEach(function(c){nItems+=c.items.length});
    html+='<div style="display:flex;align-items:center;padding:12px;background:var(--card);border-radius:var(--radius);margin-bottom:8px;box-shadow:var(--shadow);cursor:pointer" onclick="selectTemplate('+i+')">';
    html+='<div style="flex:1"><div style="font-weight:600;font-size:14px">'+esc(tmpl.name)+'</div>';
    html+='<div style="font-size:12px;color:var(--text3)">'+nItems+' 件物品 · '+tmpl.categories.length+' 个分类</div></div>';
    html+='<button class="btn-icon danger" onclick="event.stopPropagation();deleteTemplate('+i+')" title="删除模板">🗑️</button>';
    html+='</div>';
  });

  openModal('📂 加载模板',html);
}

function selectTemplate(idx){
  var templates=getTemplates();
  var tmpl=templates[idx];
  if(!tmpl)return;

  var html='<p style="margin-bottom:12px">将模板 <strong>'+esc(tmpl.name)+'</strong> 加载到：</p>';
  html+=modalField('加载到','<select id="mTmplTarget"><option value="publicGear">⛺ 公共装备</option><option value="publicFood">🍖 公共食材</option></select>');
  html+='<div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">取消</button>';
  html+='<button class="btn btn-primary" onclick="doLoadTemplate('+idx+')">📥 加载</button></div>';
  openModal('📂 加载模板',html);
}

function doLoadTemplate(idx){
  var target=document.getElementById('mTmplTarget').value;
  var templates=getTemplates();
  var tmpl=templates[idx];
  if(!tmpl)return;

  var plan=getActivePlan();if(!plan)return;
  if(!plan[target])plan[target]=[];
  var list=plan[target];

  tmpl.categories.forEach(function(tmplCat){
    var catName=tmplCat.cat;
    var existing=list.find(function(c){return c.cat===catName});
    if(!existing){existing={cat:catName,items:[]};list.push(existing);}
    tmplCat.items.forEach(function(it){
      var already=existing.items.find(function(ei){return ei.name===it.name});
      if(!already){existing.items.push({name:it.name,qty:it.quantity||'1',assignee:''});}
    });
  });

  plan[target]=list;
  saveActivePlan(plan);
  closeModal();
  renderSupplies();
  T('模板已加载到'+(target==='publicGear'?'公共装备':'公共食材'));
}

function deleteTemplate(idx){
  var templates=getTemplates();
  var name=templates[idx]?templates[idx].name:'';
  templates.splice(idx,1);
  saveTemplates(templates);
  loadTemplateModal();
  T('模板「'+name+'」已删除');
}

   ================================================================ */
function setBudget(){
  var plan=getActivePlan();if(!plan)return;
  var current=plan.budget||0;
  var html=modalField('预算金额 (¥)','<input id="mBudgetAmount" type="number" step="1" min="0" value="'+(current||'')+'" placeholder="如：2000">');
  html+='<div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">取消</button>';
  html+='<button class="btn btn-primary" onclick="saveBudget()">设置预算</button></div>';
  openModal('💰 设置预算',html);
}

function saveBudget(){
  var amount=parseFloat(document.getElementById('mBudgetAmount').value);
  if(isNaN(amount)||amount<0){T('请输入有效金额');return;}
  var plan=getActivePlan();if(!plan)return;
  plan.budget=amount;
  saveActivePlan(plan);
  closeModal();renderExpenses();
}
